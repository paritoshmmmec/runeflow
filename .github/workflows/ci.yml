name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate examples
        run: |
          npx runeflow validate ./examples/open-pr.md
          npx runeflow validate ./examples/block-demo.md
          npx runeflow validate ./examples/release-notes.md

      - name: Smoke test runeflow init
        run: |
          mkdir -p /tmp/runeflow-init-test
          cd /tmp/runeflow-init-test
          git init -q
          git config user.email "ci@runeflow.dev"
          git config user.name "Runeflow CI"
          git commit --allow-empty -m "init" -q
          node $GITHUB_WORKSPACE/bin/runeflow.js init --no-local-llm --force
          node $GITHUB_WORKSPACE/bin/runeflow.js validate *.md
